<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960" role="img" aria-label="Star Progression">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <symbol id="star" viewBox="-50 -50 100 100">
      <polygon points="0,-46 13,-14 46,-14 19,7 29,40 0,20 -29,40 -19,7 -46,-14 -13,-14"/>
    </symbol>
  </defs>
  <rect width="540" height="960" fill="url(#bg)"/>
  <rect width="540" height="960" fill="url(#glow)"/>
  <use href="#star" x="130" y="280" width="80" height="80" fill="#38bdf8" opacity="0.95"/>
  <use href="#star" x="220" y="250" width="100" height="100" fill="#38bdf8" opacity="0.95"/>
  <use href="#star" x="330" y="270" width="90" height="90" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.7"/>
  <g fill="#38bdf8" opacity="0.35">
    <circle cx="140" cy="220" r="3"/>
    <circle cx="410" cy="210" r="4"/>
    <circle cx="180" cy="420" r="4"/>
    <circle cx="380" cy="410" r="3"/>
    <circle cx="270" cy="200" r="2"/>
  </g>
  <rect x="250" y="510" width="40" height="3" fill="#38bdf8" rx="2"/>
  <text x="270" y="580" text-anchor="middle" font-size="40" font-weight="700" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, sans-serif">Star Progression</text>
  <text x="270" y="625" text-anchor="middle" font-size="20" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, sans-serif">Perfect every level</text>
</svg>
