<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960" role="img" aria-label="Hundreds of Stages">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <symbol id="hex" viewBox="-30 -30 60 60">
      <polygon points="-26,-15 0,-30 26,-15 26,15 0,30 -26,15" fill="none" stroke="#22c55e" stroke-width="3"/>
    </symbol>
    <symbol id="hexf" viewBox="-30 -30 60 60">
      <polygon points="-26,-15 0,-30 26,-15 26,15 0,30 -26,15" fill="#22c55e"/>
    </symbol>
  </defs>
  <rect width="540" height="960" fill="url(#bg)"/>
  <rect width="540" height="960" fill="url(#glow)"/>
  <g>
    <use href="#hex" x="180" y="240" width="60" height="60" opacity="0.6"/>
    <use href="#hexf" x="240" y="240" width="60" height="60" opacity="0.9"/>
    <use href="#hex" x="300" y="240" width="60" height="60" opacity="0.6"/>
    <use href="#hex" x="150" y="300" width="60" height="60" opacity="0.45"/>
    <use href="#hex" x="210" y="300" width="60" height="60" opacity="0.85"/>
    <use href="#hexf" x="270" y="300" width="60" height="60" opacity="0.7"/>
    <use href="#hex" x="330" y="300" width="60" height="60" opacity="0.45"/>
    <use href="#hex" x="180" y="360" width="60" height="60" opacity="0.6"/>
    <use href="#hex" x="240" y="360" width="60" height="60" opacity="0.85"/>
    <use href="#hex" x="300" y="360" width="60" height="60" opacity="0.6"/>
    <use href="#hexf" x="210" y="420" width="60" height="60" opacity="0.5"/>
    <use href="#hex" x="270" y="420" width="60" height="60" opacity="0.45"/>
  </g>
  <rect x="250" y="550" width="40" height="3" fill="#22c55e" rx="2"/>
  <text x="270" y="620" text-anchor="middle" font-size="40" font-weight="700" fill="#e2e8f0" font-family="Inter, system-ui, -apple-system, sans-serif">Hundreds of Stages</text>
  <text x="270" y="665" text-anchor="middle" font-size="20" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, sans-serif">Endless variety</text>
